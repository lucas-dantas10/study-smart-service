server:
  port: ${SERVER_PORT:8080}
spring:
  h2:
    console:
      enabled: true
  application:
    name: study_smart_service
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:study_smart_db}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:root}
    driver-class-name: org.h2.Driver
    hikari:
      max-lifetime: 15000
      idle-timeout: 10000
      keepalive-time: 5000
      connection-timeout: 30000
      validation-timeout: 5000
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  jackson:
    date-format: yyyy-MM-dd
    time-zone: America/Sao_Paulo
    property-naming-strategy: com.fasterxml.jackson.databind.PropertyNamingStrategies.SnakeCaseStrategy
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub
jwt:
  secret: Py+iM0RLDoelxAJ3SZxL5L1z7jujb2WFzT6WfLp08AY=
  expiration: ${JWT_EXPIRATION:3600000}
  frontend-redirect-url: ${JWT_FRONTEND_REDIRECT_URL:http://localhost:5173/auth/callback}
rate-limit:
  minutes: 1
  tokens: 100
frontend:
  uri: ${FRONTEND_URI:http://localhost:5173}
user:
  email: ${USER_EMAIL_TEST:teste@example.com}